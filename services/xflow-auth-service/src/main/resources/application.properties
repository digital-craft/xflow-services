spring.application.name=xflow-auth-service
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=auth
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.flyway.schemas=auth
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true

rsa.private-key=${RSA_PRIVATE_KEY}
rsa.public-key=${RSA_PUBLIC_KEY}
rsa.expiration-ms=${EXPIRATION_MS}
rsa.refresh-expiration-ms=${REFRESH_EXPIRATION_MS}
jwt.max-failed-attempts=${AUTH_MAX_FAILED_ATTEMPTS}
jwt.lockout-duration-ms=${AUTH_LOCKOUT_DURATION_MS}
jwt.anon-max-attempts=${AUTH_ANON_MAX_ATTEMPTS}
jwt.anon-lockout-duration-ms=${AUTH_ANON_LOCKOUT_DURATION_MS}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true

springdoc.webflux.webjars.prefix=/webjars
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/api/docs
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.configUrl=/v3/api-docs/swagger-config
springdoc.swagger-ui.operationsSorter=alpha